name: DevSecOps Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  id-token: write

# env: sets variables available to all jobs
# We define our AWS config here once rather than repeating in every job
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devsecops-project1

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: SAST — Semgrep
  # ─────────────────────────────────────────────
  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: |
          pip install semgrep
          semgrep --config=auto \
                  --sarif \
                  --output=semgrep.sarif \
                  app/ || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()

      - name: Enforce Semgrep gate
        run: |
          pip install semgrep
          semgrep --config=auto --error app/

  # ─────────────────────────────────────────────
  # JOB 2: SCA — Trivy
  # ─────────────────────────────────────────────
  sca:
    name: SCA — Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vulnapp:${{ github.sha }} .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vulnapp:${{ github.sha }}
          format: json
          output: trivy-results.json
          exit-code: '0'

      - name: Enforce Trivy gate
        run: python3 trivy-check.py trivy-results.json

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json
        if: always()

  # ─────────────────────────────────────────────
  # JOB 3: Secrets — Gitleaks
  # ─────────────────────────────────────────────
  secrets:
    name: Secrets — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # JOB 4: IaC — Checkov
  # ─────────────────────────────────────────────
  iac:
    name: IaC — Checkov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          soft_fail: true
          output_format: cli

  # ─────────────────────────────────────────────
  # JOB 5: Deploy gate
  # All security jobs must pass before this runs
  # ─────────────────────────────────────────────
  deploy-gate:
    name: Deploy gate
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, iac]
    steps:
      - name: All security checks passed
        run: |
          echo "All security gates passed."
          echo "Proceeding to build and push to ECR."

  # ─────────────────────────────────────────────
  # JOB 6: Build and push to ECR
  # Only runs after deploy-gate passes
  # Uses OIDC — no stored AWS credentials anywhere
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    # This job only runs after deploy-gate succeeds
    # Which means all 4 security scans passed
    needs: [deploy-gate]

    # Only push on direct pushes to main
    # Don't push on pull requests — PRs are for scanning only
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC authentication step
      # This is the magic — no stored credentials needed
      # aws-actions/configure-aws-credentials handles the JWT exchange:
      # 1. Requests a JWT from GitHub's OIDC endpoint
      # 2. Sends it to AWS STS with your role ARN
      # 3. AWS verifies the JWT matches your trust policy conditions
      # 4. AWS returns temporary credentials (1 hour expiry)
      # 5. Those credentials are set as environment variables for this job
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/GitHubActions-DevSecOps
          aws-region: ${{ env.AWS_REGION }}
          # role-session-name appears in CloudTrail logs
          # Using the commit SHA means every AWS action is traceable
          # to the exact commit that triggered it
          role-session-name: github-actions-${{ github.sha }}

      # Login to ECR using the temporary credentials from OIDC
      # amazon-ecr-login runs: aws ecr get-login-password | docker login
      # It uses the temporary credentials automatically
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build, tag with commit SHA, and push
      # Using commit SHA as tag means:
      # - Every image is traceable to an exact commit
      # - You can roll back to any previous image by SHA
      # - No ambiguity about what code is in which image
      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

          echo "Building image: $IMAGE_URI"
          docker build -t $IMAGE_URI .

          echo "Pushing to ECR..."
          docker push $IMAGE_URI

          echo "Image pushed successfully: $IMAGE_URI"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      # Verify the push succeeded by checking ECR
      - name: Verify image in ECR
        run: |
          aws ecr describe-images \
            --repository-name $ECR_REPOSITORY \
            --region $AWS_REGION \
            --query 'imageDetails[*].{tags:imageTags,pushed:imagePushedAt}' \
            --output table