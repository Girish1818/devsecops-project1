apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flask-app
  labels:
    app: flask-app
    environment: dev
    team: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
        environment: dev
        team: security
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "flask-app"
        vault.hashicorp.com/agent-inject-secret-config: "flask/data/config"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "flask/data/config" -}}
          {{ .Data.data.secret_key }}
          {{- end }}
    spec:
      serviceAccountName: flask-app-sa
      automountServiceAccountToken: true
      containers:
        - name: flask-app
          image: flask-app:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_SECRET_KEY
              value: "local-dev-secret"